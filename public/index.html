<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Ordering Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">FO</span>
        <div>
          <div class="brand-title">FoodOrder</div>
          <div class="brand-sub">Admin Console</div>
        </div>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
    </aside>

    <!-- Main -->
    <div class="content-area">
      <header class="topbar">
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-admin">
          <span class="admin-avatar" id="admin-avatar">A</span>
          <span id="admin-name">Admin</span>
          <button class="logout-btn" id="logout-btn">Log out</button>
        </div>
      </header>
      <main id="main" class="main"></main>
      <footer class="footer">© 2026 Food Ordering System</footer>
    </div>

  </div>

  <!-- Add/Edit Modal -->
  <div id="modal" class="modal-overlay">
    <div id="modal-backdrop" class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">Add record</h3>
        <button id="modal-close" class="modal-close">×</button>
      </div>
      <form id="modal-form" class="modal-form"></form>
      <div class="modal-footer">
        <button type="submit" form="modal-form" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="confirm-modal" class="modal-overlay">
    <div id="confirm-backdrop" class="modal-backdrop"></div>
    <div class="modal-box modal-box-sm">
      <div class="modal-header">
        <h3>Confirm delete</h3>
      </div>
      <p id="confirm-text" class="confirm-text"></p>
      <div class="modal-footer">
        <button id="confirm-cancel" class="btn btn-ghost">Cancel</button>
        <button id="confirm-yes" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/icons.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
